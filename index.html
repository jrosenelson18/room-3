<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Terminal</title>
<style>
/* Full screen terminal */
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
}

body {
    background-color: #000;
    color: #0f0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Animated background */
canvas#bgCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
}

/* Heading */
h1 {
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    z-index: 1;
    position: relative;
    color: #f00;
    text-shadow:
        0 0 2px #f00,
        0 0 4px #f00,
        0 0 6px #f00,
        0 0 8px #f00;
}

/* Terminal line */
.terminal-line {
    display: flex;
    align-items: center;
    font-size: 18px;
    z-index: 1;
    position: relative;
}

/* Search input */
#searchInput {
    background: rgba(0,0,0,0.8);
    border: 2px solid #0f0;
    border-radius: 4px;
    color: #0f0;
    font-size: 18px;
    width: 320px;
    padding: 8px 12px;
    outline: none;
    box-shadow: 0 0 10px #0f0;
}

/* Quips */
#result {
    margin-top: 20px;
    font-size: 18px;
    white-space: pre-wrap;
    z-index: 1;
    position: relative;
    color: #f00;
    font-weight: bold;
    text-shadow: 0 0 2px #f00;
}

/* Escape screen */
#escapeScreen {
    position: absolute;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    background-color: #000;
    color: #f00;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease-in-out;
    z-index: 10;
}

#escapeScreen.show {
    opacity: 1;
    pointer-events: all;
}

/* Button style */
#nextPageBtn {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 20px;
    color: #fff;
    background-color: #f00;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 0 20px #f00, 0 0 40px #f00, 0 0 60px #f00;
    transition: transform 0.2s, box-shadow 0.2s;
}

#nextPageBtn:hover {
    transform: scale(1.1);
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<h1>Search for the exit</h1>
<div class="terminal-line">
    <input type="text" id="searchInput" placeholder="">
</div>
<div id="result"></div>

<!-- Escape screen -->
<div id="escapeScreen">
    The final door opens…<br>
    click the button to walk through
    <button id="nextPageBtn" onclick="window.open('https://jrosenelson18.github.io/room-4/', '_blank')">Escape?</button>
</div>

<script>
window.onload = function () {

// === Terminal logic ===
const input = document.getElementById('searchInput');
const result = document.getElementById('result');
const escapeScreen = document.getElementById('escapeScreen');

const wrongResponses = [
    "Access denied… nice try.",
    "You shall not pass!",
    "Invalid command. Try again.",
    "Not even close.",
    "Are you even trying?",
    "Nope. Not today, hacker."
];

function getRandomResponse() {
    return wrongResponses[Math.floor(Math.random() * wrongResponses.length)];
}

function handleInput() {
    const value = input.value.trim().toLowerCase();
    if (value === "the exit") {
        result.textContent = "";
        input.disabled = true;
        escapeScreen.classList.add("show");
    } else if (value !== "") {
        result.textContent = getRandomResponse();
    }
    input.value = "";
}

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleInput();
});

input.focus();

// === Matrix-style background ===
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@$%&*+-";
const fontSize = 20;
const columns = Math.floor(width / fontSize);
const drops = [];
for(let i = 0; i < columns; i++) drops[i] = Math.random() * height;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.07)";
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if(drops[i] * fontSize > height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 50);

window.addEventListener("resize", () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

// === Random neon flicker ===
const nextBtn = document.getElementById('nextPageBtn');
function randomFlicker() {
    const blur1 = Math.random() * 20 + 10;
    const blur2 = blur1 * 2;
    const blur3 = blur1 * 3;
    nextBtn.style.boxShadow = `0 0 ${blur1}px #f00, 0 0 ${blur2}px #f00, 0 0 ${blur3}px #f00`;
    setTimeout(randomFlicker, Math.random() * 200 + 50);
}
randomFlicker();

};
</script>
</body>
</html>
